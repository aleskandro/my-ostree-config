name: Build OS Content
on:
  schedule:
    - cron: '0 5 * * *'
  push:
    branches:
      - master
  workflow_dispatch: {}

env:
  REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
  IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value={{sha}}-{{date 'iso8601'}}
      - name: Checkout
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          build-args: |
            BASE_REPO=quay.io/fedora/fedora-silverblue
            TOOLBOX_IMAGE=quay.io/aleskandrox/fedora:toolbox
          file: ./os_desktop.Containerfile
